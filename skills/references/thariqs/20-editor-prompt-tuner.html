<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Birchline — Support reply prompt tuner</title>
<style>
  :root {
    --ivory: #FAF9F5;
    --slate: #141413;
    --clay: #D97757;
    --clay-d: #B85C3E;
    --oat: #E3DACC;
    --olive: #788C5D;
    --gray-50: #F0EEE6;
    --gray-200: #D1CFC5;
    --gray-500: #87867F;
    --gray-800: #3D3D3A;
    --white: #ffffff;
    --serif: ui-serif, Georgia, "Times New Roman", serif;
    --sans: system-ui, -apple-system, "Segoe UI", sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--ivory);
    color: var(--slate);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
  }
  .wrap {
    max-width: 1180px;
    margin: 0 auto;
    padding: 48px 32px 64px;
  }

  /* ---------- header ---------- */
  header { margin-bottom: 22px; }
  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gray-500);
  }
  h1 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 30px;
    letter-spacing: -0.01em;
    margin: 6px 0 4px;
  }
  .sub {
    color: var(--gray-500);
    max-width: 640px;
  }

  /* ---------- toolbar ---------- */
  .toolbar {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--ivory);
    padding: 10px 0 14px;
    margin-bottom: 6px;
    border-bottom: 1px solid var(--gray-200);
  }
  .toolbar .spacer { flex: 1; }
  .toolbar .hint {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--gray-500);
    letter-spacing: 0.02em;
  }
  button {
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
  }
  .btn-primary {
    background: var(--slate);
    color: var(--ivory);
    border: 1.5px solid var(--slate);
    border-radius: 999px;
    padding: 9px 16px;
    transition: background 140ms ease, transform 80ms ease;
  }
  .btn-primary:hover { background: var(--gray-800); }
  .btn-primary:active { transform: translateY(1px); }
  .btn-primary.copied { background: var(--olive); border-color: var(--olive); }
  .btn-ghost {
    background: transparent;
    color: var(--gray-800);
    border: 1.5px solid var(--gray-200);
    border-radius: 999px;
    padding: 8px 15px;
    transition: border-color 140ms ease, color 140ms ease;
  }
  .btn-ghost:hover { border-color: var(--gray-500); color: var(--slate); }

  /* ---------- two-column layout ---------- */
  .cols {
    display: grid;
    grid-template-columns: minmax(0, 1.1fr) minmax(0, 1fr);
    gap: 24px;
    align-items: start;
    margin-top: 18px;
  }
  @media (max-width: 880px) {
    .cols { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--white);
    border: 1.5px solid var(--gray-200);
    border-radius: 12px;
    overflow: hidden;
  }

  /* ---------- left: editor ---------- */
  .ed-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 16px;
    border-bottom: 1.5px solid var(--gray-200);
    background: var(--gray-50);
  }
  .ed-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--gray-500);
    text-transform: uppercase;
  }
  .ed-toolbar .spacer { flex: 1; }
  .counter {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--gray-800);
    background: var(--white);
    border: 1.5px solid var(--gray-200);
    border-radius: 999px;
    padding: 3px 10px;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .editor {
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    padding: 18px;
    min-height: 360px;
    white-space: pre-wrap;
    word-break: break-word;
    background: var(--white);
    color: var(--slate);
    outline: none;
    caret-color: var(--clay);
    tab-size: 2;
  }
  .editor:focus-visible { outline: none; }
  .slot {
    background: var(--oat);
    color: var(--clay-d);
    border-radius: 4px;
    padding: 0 3px;
    font-weight: 600;
  }
  .slot.warn {
    background: rgba(217, 119, 87, 0.14);
    color: var(--clay-d);
    text-decoration: underline dashed var(--clay) 1.5px;
    text-underline-offset: 3px;
  }

  .legend {
    border-top: 1.5px solid var(--gray-200);
    padding: 12px 16px 14px;
    background: var(--gray-50);
  }
  .legend-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gray-500);
    margin-bottom: 8px;
  }
  .legend-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    font-family: var(--mono);
    font-size: 11px;
    background: var(--oat);
    color: var(--clay-d);
    border-radius: 4px;
    padding: 2px 7px;
    font-weight: 600;
  }

  /* ---------- right: preview ---------- */
  .preview-panel { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .preview-head {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gray-500);
    padding: 0 2px 2px;
  }
  .sample {
    border: 1.5px solid var(--gray-200);
    border-radius: 10px;
    overflow: hidden;
  }
  .sample-head {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 9px 13px;
    bord
