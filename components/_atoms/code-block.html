<code><span class="cm">// 每个请求过中间件先解析 bucket key, 再问 Redis token-bucket</span>
function <span class="hl">rateLimit</span>(name?: string) {
  return async (req, res, next) => {
    const key = resolveBucket(req);
    const ok  = await tokenBucket.<span class="hl">consume</span>(name, key);
    if (!ok) return res.status(429).end();
    next();
  };
}</code>
