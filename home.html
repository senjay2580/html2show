<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>html2show · 知识图书馆</title>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root {
    --blue:    #0071e3;
    --blue-2:  #0066cc;
    --blue-soft: #e8f1ff;
    --red:     #ff3b30;
    --red-soft: #fff1f0;
    --ink:     #1d1d1f;
    --ink-2:   #424245;
    --ink-3:   #86868b;
    --line:    #e8e8ed;
    --bg:      #fbfbfd;
    --card:    #ffffff;
    --dot:     #d2d2d7;
    --inverse-bg: #1d1d1f;
    --inverse-text: #ffffff;
    --mono: 'SF Mono', 'JetBrains Mono', 'Consolas', 'Menlo', monospace;
  }
  body.dark {
    --blue:    #4ea2ff;
    --blue-2:  #7fbdff;
    --blue-soft: rgba(78, 162, 255, 0.16);
    --ink:     #f5f5f7;
    --ink-2:   #d2d2d7;
    --ink-3:   #8e8e93;
    --line:    #38383c;
    --bg:      #1a1a1c;
    --card:    #2a2a2d;
    --dot:     #2e2e32;
    --inverse-bg: #0a0a0c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display',
                 'Inter', 'Microsoft YaHei', 'PingFang SC', sans-serif;
    color: var(--ink);
    background-color: var(--bg);
    background-image: radial-gradient(circle, var(--dot) 1px, transparent 1px);
    background-size: 24px 24px;
    line-height: 1.6;
    padding: 60px 32px 100px;
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.01em;
    transition: background-color 0.4s, color 0.4s;
    min-height: 100vh;
  }
  .page { max-width: 1280px; margin: 0 auto; }

  /* ============== Hero ============== */
  .hero {
    text-align: center;
    margin-bottom: 56px;
    padding: 24px 0 40px;
  }
  .hero .eyebrow {
    color: var(--blue);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 18px;
    font-family: var(--mono);
  }
  .hero h1 {
    font-size: 72px;
    font-weight: 700;
    letter-spacing: -2.5px;
    line-height: 1;
    margin-bottom: 18px;
    background: linear-gradient(135deg, var(--ink) 0%, var(--blue) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hero .sub { color: var(--ink-3); font-size: 17px; }

  /* ============== 搜索栏 ============== */
  .search-wrap {
    max-width: 720px;
    margin: 0 auto 24px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    padding: 18px 24px 18px 56px;
    border: none;
    border-radius: 16px;
    background: var(--card);
    color: var(--ink);
    font-size: 16px;
    font-family: inherit;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.04);
    outline: none;
    transition: all 0.3s;
  }
  .search-wrap input:focus {
    box-shadow: 0 1px 2px rgba(0,113,227,0.1), 0 8px 28px rgba(0,113,227,0.12);
  }
  .search-wrap .search-icon {
    position: absolute;
    left: 22px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-3);
    pointer-events: none;
  }
  .search-wrap .kbd {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-3);
    background: var(--blue-soft);
    padding: 4px 10px;
    border-radius: 6px;
    pointer-events: none;
  }

  /* ============== 标签筛选 ============== */
  .tag-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 40px;
  }
  .tag {
    padding: 7px 16px;
    border-radius: 999px;
    background: var(--card);
    color: var(--ink-2);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    box-shadow: 0 1px 2px rgba(0,0,0,0.03);
  }
  .tag:hover { color: var(--blue); }
  .tag.active {
    background: var(--blue);
    color: white;
  }
  .tag .count {
    margin-left: 6px;
    opacity: 0.6;
    font-size: 11px;
    font-family: var(--mono);
  }

  /* ============== 面包屑 ============== */
  .breadcrumbs {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 28px;
    font-size: 14px;
    color: var(--ink-3);
  }
  .breadcrumbs a {
    color: var(--ink-3);
    text-decoration: none;
    padding: 6px 12px;
    border-radius: 8px;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .breadcrumbs a:hover {
    background: var(--blue-soft);
    color: var(--blue);
  }
  .breadcrumbs a.current {
    color: var(--ink);
    font-weight: 600;
  }
  .breadcrumbs .sep { color: var(--ink-3); opacity: 0.5; }

  /* ============== 视图切换 ============== */
  .view-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .view-toolbar .info {
    color: var(--ink-3);
    font-size: 14px;
    font-family: var(--mono);
  }
  .view-toolbar .info b { color: var(--ink); }
  .view-toolbar .switch {
    display: flex;
    background: var(--card);
    border-radius: 10px;
    padding: 4px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .view-toolbar .switch button {
    border: none;
    background: transparent;
    padding: 6px 12px;
    border-radius: 7px;
    color: var(--ink-3);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-family: inherit;
  }
  .view-toolbar .switch button.active {
    background: var(--blue);
    color: white;
  }
  .view-toolbar .switch button:not(.active):hover { color: var(--ink); }

  /* ============== 网格视图 ============== */
  .grid-view {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }
  .item-card {
    background: var(--card);
    border-radius: 18px;
    padding: 26px;
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.04);
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    overflow: hidden;
    animation: cardIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) backwards;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .item-card::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 80px; height: 80px;
    background: radial-gradient(circle at top right, var(--blue-soft) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .item-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 16px 36px rgba(0,0,0,0.10);
  }
  .item-card:hover::after { opacity: 1; }
  .item-card .icon-box {
    width: 48px; height: 48px;
    border-radius: 12px;
    background: var(--blue-soft);
    color: var(--blue);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .item-card .name {
    font-size: 18px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.3px;
  }
  .item-card .desc {
    font-size: 13.5px;
    color: var(--ink-2);
    line-height: 1.6;
    flex: 1;
  }
  .item-card .meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 12px;
    border-top: 1px dashed var(--line);
    font-size: 12px;
    color: var(--ink-3);
    font-family: var(--mono);
  }
  .item-card .type-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 6px;
    background: var(--blue-soft);
    color: var(--blue);
    font-size: 11px;
    font-weight: 600;
    font-family: var(--mono);
    letter-spacing: 0.5px;
  }
  .item-card .type-badge.folder {
    background: rgba(234, 88, 12, 0.12);
    color: #ea580c;
  }
  .item-card.empty .icon-box {
    background: rgba(134, 134, 139, 0.1);
    color: var(--ink-3);
  }
  .item-card.empty {
    opacity: 0.65;
    cursor: default;
  }
  .item-card.empty:hover {
    transform: none;
  }
  .item-card .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .item-card .tags span {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--blue-soft);
    color: var(--blue-2);
    font-family: var(--mono);
  }

  /* ============== 列表视图 ============== */
  .list-view {
    background: var(--card);
    border-radius: 16px;
    padding: 8px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.04);
  }
  .list-row {
    display: grid;
    grid-template-columns: 40px 1fr auto auto;
    align-items: center;
    gap: 16px;
    padding: 12px 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s;
    text-decoration: none;
    color: inherit;
  }
  .list-row:hover { background: var(--blue-soft); }
  .list-row .l-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: var(--blue-soft);
    color: var(--blue);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .list-row .l-info .l-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
  }
  .list-row .l-info .l-desc {
    font-size: 12.5px;
    color: var(--ink-3);
    margin-top: 2px;
  }
  .list-row .l-meta {
    font-size: 12px;
    color: var(--ink-3);
    font-family: var(--mono);
  }

  /* ============== 空状态 ============== */
  .empty-state {
    text-align: center;
    padding: 80px 32px;
    color: var(--ink-3);
  }
  .empty-state .icon-box {
    width: 80px; height: 80px;
    border-radius: 20px;
    background: var(--blue-soft);
    color: var(--blue);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
  }
  .empty-state h3 {
    color: var(--ink);
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .empty-state p { font-size: 15px; }

  /* ============== FAB ============== */
  #fab-group {
    position: fixed;
    right: 24px;
    bottom: 24px;
    z-index: 900;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .fab {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: none;
    background: var(--card);
    color: var(--ink);
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .fab:hover {
    background: var(--blue);
    color: white;
    transform: translateY(-2px);
  }
  #fab-top { opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  #fab-top.visible { opacity: 1; pointer-events: auto; }

  /* ============== 顶部角标 ============== */
  .top-corners {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 900;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .gh-corner {
    background: var(--card);
    color: var(--ink);
    padding: 10px 16px;
    border-radius: 999px;
    text-decoration: none;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.06);
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, color 0.2s ease;
    line-height: 1;
  }
  .gh-corner:hover {
    background: var(--ink);
    color: var(--card);
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.16);
  }

  /* 导航入口：低调文字链 + 下划线动画 */
  .nav-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-2);
    text-decoration: none;
    padding: 10px 4px;
    position: relative;
    transition: color 0.2s ease;
    line-height: 1;
  }
  .nav-link::after {
    content: '';
    position: absolute;
    left: 4px;
    right: 4px;
    bottom: 6px;
    height: 1.5px;
    background: currentColor;
    transform: scaleX(0);
    transform-origin: right center;
    transition: transform 0.32s cubic-bezier(0.65, 0, 0.35, 1);
  }
  .nav-link:hover {
    color: var(--blue);
  }
  .nav-link:hover::after {
    transform: scaleX(1);
    transform-origin: left center;
  }
  .nav-link .arrow {
    transition: transform 0.25s ease;
  }
  .nav-link:hover .arrow {
    transform: translate(2px, -2px);
  }
  .nav-link.soon {
    position: relative;
  }
  .nav-link.soon::before {
    content: '';
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #c8a23a;
    margin-right: 4px;
    box-shadow: 0 0 0 0 rgba(200, 162, 58, 0.6);
    animation: navSoonPulse 2s infinite;
  }
  @keyframes navSoonPulse {
    0%   { box-shadow: 0 0 0 0 rgba(200, 162, 58, 0.6); }
    70%  { box-shadow: 0 0 0 7px rgba(200, 162, 58, 0); }
    100% { box-shadow: 0 0 0 0 rgba(200, 162, 58, 0); }
  }
  .nav-link.soon[title]:hover .tip,
  .nav-link.soon[title]:hover::after {
    content: attr(title);
    position: absolute;
    top: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--card);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1px;
    padding: 5px 10px;
    border-radius: 6px;
    white-space: nowrap;
    pointer-events: none;
    box-shadow: 0 6px 16px rgba(0,0,0,0.18);
  }

  @media (max-width: 720px) {
    body { padding: 32px 16px 80px; }
    .hero h1 { font-size: 44px; }
    .top-corners { top: 16px; right: 16px; gap: 8px; }
    .gh-corner span { display: none; }
    .gh-corner { padding: 10px 12px; }
    .nav-link { font-size: 12px; }
    .grid-view { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="top-corners">
  <a href="https://github.com/senjay2580/html2show" target="_blank" class="gh-corner">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
    </svg>
    <span>GitHub</span>
  </a>
</div>

<div class="page">
  <!-- Hero -->
  <div class="hero">
    <div class="eyebrow">html2show · KNOWLEDGE LIBRARY</div>
    <h1>知识图书馆</h1>
    <div class="sub">Apple/Karpathy 风教学 HTML · 双视图 · 全主题</div>
  </div>

  <!-- 搜索栏 -->
  <div class="search-wrap">
    <i data-lucide="search" class="search-icon" style="width:20px;height:20px;"></i>
    <input id="search" type="text" placeholder="搜索主题、标签、关键词..." autocomplete="off">
    <span class="kbd">Ctrl K</span>
  </div>

  <!-- 标签筛选 -->
  <div class="tag-bar" id="tag-bar"></div>

  <!-- 面包屑 -->
  <nav class="breadcrumbs" id="breadcrumbs"></nav>

  <!-- 视图工具栏 -->
  <div class="view-toolbar">
    <div class="info">共 <b id="count">0</b> 项</div>
    <div class="switch">
      <button class="active" data-view="grid">
        <i data-lucide="layout-grid" style="width:14px;height:14px;"></i>网格
      </button>
      <button data-view="list">
        <i data-lucide="list" style="width:14px;height:14px;"></i>列表
      </button>
    </div>
  </div>

  <!-- 内容区 -->
  <div id="content"></div>
</div>

<!-- FAB -->
<div id="fab-group">
  <button class="fab" id="fab-theme" title="切换日夜模式">
    <i data-lucide="moon" style="width:20px;height:20px;"></i>
  </button>
  <button class="fab" id="fab-top" title="回到顶部">
    <i data-lucide="arrow-up" style="width:20px;height:20px;"></i>
  </button>
</div>

<script>
  // ========== State ==========
  let manifest = null;
  let currentPath = '/';
  let currentView = 'grid';
  let activeTag = '';
  let searchQuery = '';

  // ========== 工具 ==========
  function findNode(path) {
    if (!manifest) return null;
    if (path === '/' || !path) return manifest.tree;
    const parts = path.split('/').filter(Boolean);
    let node = manifest.tree;
    for (const part of parts) {
      const child = (node.children || []).find(
        c => c.path === '/' + parts.slice(0, parts.indexOf(part) + 1).join('/')
      );
      if (child) node = child;
      else return null;
    }
    return node;
  }

  function flattenAll(node, list = []) {
    if (!node) return list;
    if (node.type === 'page') list.push(node);
    (node.children || []).forEach(c => flattenAll(c, list));
    return list;
  }

  function collectTags() {
    const all = flattenAll(manifest.tree);
    const counts = {};
    all.forEach(p => (p.tags || []).forEach(t => { counts[t] = (counts[t] || 0) + 1; }));
    return counts;
  }

  // ========== 渲染 ==========
  function renderBreadcrumbs() {
    const el = document.getElementById('breadcrumbs');
    el.innerHTML = '';
    const parts = currentPath.split('/').filter(Boolean);

    // 根
    const home = document.createElement('a');
    home.href = '#/';
    home.innerHTML = '<i data-lucide="home" style="width:14px;height:14px;"></i> 全部';
    if (parts.length === 0) home.classList.add('current');
    el.appendChild(home);

    parts.forEach((part, i) => {
      const sep = document.createElement('span');
      sep.className = 'sep';
      sep.innerHTML = '<i data-lucide="chevron-right" style="width:14px;height:14px;"></i>';
      el.appendChild(sep);

      const subPath = '/' + parts.slice(0, i + 1).join('/');
      const node = findNode(subPath);
      const a = document.createElement('a');
      a.href = '#' + subPath;
      a.textContent = node ? node.name : part;
      if (i === parts.length - 1) a.classList.add('current');
      el.appendChild(a);
    });

    if (window.lucide) lucide.createIcons();
  }

  function renderTagBar() {
    const el = document.getElementById('tag-bar');
    const counts = collectTags();
    const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);

    el.innerHTML = `<button class="tag ${activeTag === '' ? 'active' : ''}" data-tag="">
        全部 <span class="count">${flattenAll(manifest.tree).length}</span>
      </button>`;
    entries.forEach(([tag, n]) => {
      el.innerHTML += `<button class="tag ${activeTag === tag ? 'active' : ''}" data-tag="${tag}">
        ${tag} <span class="count">${n}</span>
      </button>`;
    });
    el.querySelectorAll('.tag').forEach(btn => {
      btn.onclick = () => {
        activeTag = btn.dataset.tag;
        render();
      };
    });
  }

  function getDisplayItems() {
    const node = findNode(currentPath);
    if (!node) return [];

    let items = [];

    // 搜索模式: 全树扁平
    if (searchQuery) {
      const all = flattenAll(manifest.tree);
      const q = searchQuery.toLowerCase();
      items = all.filter(p =>
        p.name.toLowerCase().includes(q) ||
        (p.desc || '').toLowerCase().includes(q) ||
        (p.tags || []).some(t => t.toLowerCase().includes(q))
      );
    } else if (activeTag) {
      // 标签筛选: 全树过滤
      const all = flattenAll(manifest.tree);
      items = all.filter(p => (p.tags || []).includes(activeTag));
    } else {
      // 普通: 显示当前层级 children
      items = node.children || [];
    }

    return items;
  }

  function renderItems() {
    const items = getDisplayItems();
    document.getElementById('count').textContent = items.length;

    const container = document.getElementById('content');

    if (items.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon-box">
            <i data-lucide="folder-open" style="width:36px;height:36px;"></i>
          </div>
          <h3>这里还是空的</h3>
          <p>${searchQuery ? '没有匹配项, 试试别的关键词' : activeTag ? '该标签下暂无内容' : '该目录下还没有内容, 期待新主题加入'}</p>
        </div>
      `;
      if (window.lucide) lucide.createIcons();
      return;
    }

    if (currentView === 'grid') {
      container.className = 'grid-view';
      container.innerHTML = items.map(it => renderCard(it)).join('');
    } else {
      container.className = 'list-view';
      container.innerHTML = items.map(it => renderRow(it)).join('');
    }

    // 绑定点击
    container.querySelectorAll('[data-target]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.preventDefault();
        const target = el.dataset.target;
        const isPage = el.dataset.page === 'true';
        if (isPage) {
          window.open(target, '_self');
        } else {
          window.location.hash = target;
        }
      });
    });

    if (window.lucide) lucide.createIcons();
  }

  function renderCard(it) {
    const isPage = it.type === 'page';
    const empty = !isPage && (!it.children || it.children.length === 0);
    const target = isPage ? it.path : it.path;
    const icon = it.icon || (isPage ? 'file-text' : 'folder');
    const tags = (it.tags || []).slice(0, 3).map(t => `<span>${t}</span>`).join('');
    const childCount = !isPage ? `${(it.children || []).length} 项` : '';
    const updated = it.updated ? `<span>${it.updated}</span>` : '';

    return `
      <a class="item-card ${empty ? 'empty' : ''}" ${empty ? '' : `data-target="${target}" data-page="${isPage}"`}>
        <div class="icon-box" ${it.color && !empty ? `style="background:${it.color}1f;color:${it.color};"` : ''}>
          <i data-lucide="${icon}" style="width:24px;height:24px;"></i>
        </div>
        <div class="name">${it.name}</div>
        <div class="desc">${it.desc || (empty ? '暂无内容' : '')}</div>
        ${tags ? `<div class="tags">${tags}</div>` : ''}
        <div class="meta">
          <span class="type-badge ${isPage ? '' : 'folder'}">
            <i data-lucide="${isPage ? 'file-text' : 'folder'}" style="width:11px;height:11px;"></i>
            ${isPage ? 'PAGE' : 'FOLDER'}
          </span>
          ${childCount || updated}
        </div>
      </a>
    `;
  }

  function renderRow(it) {
    const isPage = it.type === 'page';
    const empty = !isPage && (!it.children || it.children.length === 0);
    const target = it.path;
    const icon = it.icon || (isPage ? 'file-text' : 'folder');
    const meta = isPage ? (it.updated || '') : `${(it.children || []).length} 项`;

    return `
      <a class="list-row" ${empty ? '' : `data-target="${target}" data-page="${isPage}"`}>
        <div class="l-icon" ${it.color && !empty ? `style="background:${it.color}1f;color:${it.color};"` : ''}>
          <i data-lucide="${icon}" style="width:18px;height:18px;"></i>
        </div>
        <div class="l-info">
          <div class="l-name">${it.name}</div>
          <div class="l-desc">${it.desc || ''}</div>
        </div>
        <div class="l-meta">${meta}</div>
        <i data-lucide="chevron-right" style="width:16px;height:16px;color:var(--ink-3);"></i>
      </a>
    `;
  }

  function render() {
    renderBreadcrumbs();
    renderTagBar();
    renderItems();
  }

  // ========== Hash 路由 ==========
  function syncRoute() {
    const hash = window.location.hash.replace(/^#/, '') || '/';
    currentPath = hash;
    activeTag = '';
    searchQuery = '';
    document.getElementById('search').value = '';
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  window.addEventListener('hashchange', syncRoute);

  // ========== 事件 ==========
  document.querySelectorAll('.view-toolbar .switch button').forEach(btn => {
    btn.onclick = () => {
      currentView = btn.dataset.view;
      document.querySelectorAll('.view-toolbar .switch button').forEach(b =>
        b.classList.toggle('active', b === btn));
      renderItems();
    };
  });

  const searchInput = document.getElementById('search');
  searchInput.addEventListener('input', (e) => {
    searchQuery = e.target.value.trim();
    if (searchQuery) activeTag = '';
    renderItems();
  });

  // Ctrl K 聚焦搜索
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault();
      searchInput.focus();
      searchInput.select();
    }
    if (e.key === 'Escape') {
      if (document.activeElement === searchInput) {
        searchQuery = '';
        searchInput.value = '';
        renderItems();
        searchInput.blur();
      }
    }
  });

  // FAB
  const fabTop = document.getElementById('fab-top');
  fabTop.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
  window.addEventListener('scroll', () => {
    fabTop.classList.toggle('visible', window.scrollY > 300);
  });

  const fabTheme = document.getElementById('fab-theme');
  function syncThemeIcon() {
    const isDark = document.body.classList.contains('dark');
    fabTheme.innerHTML = `<i data-lucide="${isDark ? 'sun' : 'moon'}" style="width:20px;height:20px;"></i>`;
    if (window.lucide) lucide.createIcons();
  }
  if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
  fabTheme.onclick = () => {
    document.body.classList.toggle('dark');
    localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    syncThemeIcon();
  };

  // ========== Inline Fallback Manifest ==========
  // 当 fetch 失败 (例如 file:// 双击本地预览), 用这份兜底
  // GitHub Actions 在部署时会用 build-manifest.js 自动覆盖 manifest.json
  const INLINE_MANIFEST = {
    name: "html2show",
    version: "1.0.0",
    description: "Apple/Karpathy 风教学 HTML 知识图集合",
    tree: {
      name: "全部", type: "folder", path: "/", icon: "library",
      children: [
        {
          name: "操作系统", type: "folder", path: "/os",
          icon: "cpu", color: "#0071e3",
          desc: "OS · 408 知识图",
          children: [
            {
              name: "死锁 Deadlock", type: "page",
              path: "pages/deadlock.html",
              icon: "lock",
              tags: ["408", "操作系统", "死锁"],
              desc: "操作系统死锁知识图 · 4 必要条件 · 银行家算法 · RAG",
              updated: "2026-04-25"
            }
          ]
        },
        { name: "数据结构", type: "folder", path: "/ds", icon: "git-branch",
          color: "#16a34a", desc: "Data Structure · 408", children: [] },
        { name: "计算机组成", type: "folder", path: "/co", icon: "cog",
          color: "#9333ea", desc: "Computer Organization · 408", children: [] },
        { name: "计算机网络", type: "folder", path: "/network", icon: "network",
          color: "#ea580c", desc: "Computer Network · 408", children: [] }
      ]
    }
  };

  // 立即渲染初始图标 (search / tag / breadcrumb / fab)
  function initIcons() {
    if (window.lucide && lucide.createIcons) {
      lucide.createIcons();
    } else {
      setTimeout(initIcons, 200);
    }
  }
  initIcons();

  // ========== 初始化: fetch 优先, fallback 用 inline ==========
  function bootstrap(data) {
    manifest = data;
    syncRoute();
    setTimeout(() => {
      syncThemeIcon();
      if (window.lucide) lucide.createIcons();
    }, 50);
  }

  fetch('manifest.json', { cache: 'no-cache' })
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(bootstrap)
    .catch(err => {
      console.warn('fetch manifest 失败, 使用 inline fallback:', err.message);
      bootstrap(INLINE_MANIFEST);

      // file:// 协议下显示提示
      if (location.protocol === 'file:') {
        const tip = document.createElement('div');
        tip.style.cssText = `
          position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
          background: var(--inverse-bg); color: var(--inverse-text);
          padding: 14px 22px; border-radius: 12px;
          font-size: 13px; font-family: var(--mono);
          box-shadow: 0 8px 32px rgba(0,0,0,0.2);
          z-index: 1000; max-width: 90vw;
        `;
        tip.innerHTML = `本地预览中 (使用内置 manifest) · 启动 server 看最新: <b>python -m http.server 8000</b>`;
        document.body.appendChild(tip);
        setTimeout(() => tip.remove(), 8000);
      }
    });
</script>
</body>
</html>
