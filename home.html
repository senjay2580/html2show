<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="https://github.com/senjay2580.png?size=64">
<link rel="apple-touch-icon" href="https://github.com/senjay2580.png?size=180">
<title>html2show · 知识图书馆</title>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root {
    --blue:    #D97757;
    --blue-2:  #B85C3E;
    --blue-soft: #F0EEE6;
    --red:     #B85C3E;
    --red-soft: rgba(217, 119, 87, 0.10);
    --ink:     #141413;
    --ink-2:   #3D3D3A;
    --ink-3:   #87867F;
    --line:    #D1CFC5;
    --bg:      #FAF9F5;
    --card:    #ffffff;
    --dot:     #E3DACC;
    --inverse-bg: #141413;
    --inverse-text: #ffffff;
    --mono: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
    --serif: ui-serif, Georgia, "Times New Roman", Times, serif;
    --sans:  system-ui, -apple-system, "Segoe UI", Roboto, "Microsoft YaHei", "PingFang SC", sans-serif;
  }
  body.dark {
    --blue:    #E89373;
    --blue-2:  #F0A98C;
    --blue-soft: rgba(232, 147, 115, 0.16);
    --ink:     #FAF9F5;
    --ink-2:   #E3DACC;
    --ink-3:   #8e8e93;
    --line:    #38383c;
    --bg:      #1A1A18;
    --card:    #25241F;
    --dot:     #2E2C26;
    --inverse-bg: #0A0A08;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: var(--sans);
    color: var(--ink);
    background-color: var(--bg);
    background-image: radial-gradient(circle, var(--dot) 1px, transparent 1px);
    background-size: 32px 32px;
    line-height: 1.6;
    padding: 96px 32px 100px;
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.01em;
    transition: background-color 0.4s, color 0.4s;
    min-height: 100vh;
  }
  .page { max-width: 1280px; margin: 0 auto; }

  /* ============== Hero ============== */
  .hero {
    text-align: center;
    margin-bottom: 56px;
    padding: 24px 0 40px;
  }
  .hero .eyebrow {
    color: var(--blue);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 18px;
    font-family: var(--mono);
  }
  .hero h1 {
    font-size: 72px;
    font-weight: 700;
    letter-spacing: -2.5px;
    line-height: 1;
    margin-bottom: 18px;
    background: linear-gradient(135deg, var(--ink) 0%, var(--blue) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hero .sub { color: var(--ink-3); font-size: 17px; }

  /* ============== 搜索栏 ============== */
  .search-wrap {
    max-width: 720px;
    margin: 0 auto 24px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    padding: 18px 24px 18px 56px;
    border: none;
    border-radius: 16px;
    background: var(--card);
    color: var(--ink);
    font-size: 16px;
    font-family: inherit;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.04);
    outline: none;
    transition: all 0.3s;
  }
  .search-wrap input:focus {
    box-shadow: 0 1px 2px rgba(217, 119, 87,0.1), 0 8px 28px rgba(217, 119, 87,0.12);
  }
  .search-wrap .search-icon {
    position: absolute;
    left: 22px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-3);
    pointer-events: none;
  }
  .search-wrap .kbd {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-3);
    background: var(--blue-soft);
    padding: 4px 10px;
    border-radius: 6px;
    pointer-events: none;
  }

  /* ============== 标签筛选 ============== */
  .tag-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 40px;
  }
  .tag {
    padding: 7px 16px;
    border-radius: 999px;
    background: var(--card);
    color: var(--ink-2);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    box-shadow: 0 1px 2px rgba(0,0,0,0.03);
  }
  .tag:hover { color: var(--blue); }
  .tag.active {
    background: var(--blue);
    color: white;
  }
  .tag .count {
    margin-left: 6px;
    opacity: 0.6;
    font-size: 11px;
    font-family: var(--mono);
  }

  /* ============== 面包屑 ============== */
  .breadcrumbs {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 28px;
    font-size: 14px;
    color: var(--ink-3);
  }
  .breadcrumbs a {
    color: var(--ink-3);
    text-decoration: none;
    padding: 6px 12px;
    border-radius: 8px;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .breadcrumbs a:hover {
    background: var(--blue-soft);
    color: var(--blue);
  }
  .breadcrumbs a.current {
    color: var(--ink);
    font-weight: 600;
  }
  .breadcrumbs .sep { color: var(--ink-3); opacity: 0.5; }

  /* ============== 视图切换 ============== */
  .view-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .view-toolbar .info {
    color: var(--ink-3);
    font-size: 14px;
    font-family: var(--mono);
  }
  .view-toolbar .info b { color: var(--ink); }
  .view-toolbar .switch {
    display: flex;
    background: var(--card);
    border-radius: 10px;
    padding: 4px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .view-toolbar .switch button {
    border: none;
    background: transparent;
    padding: 6px 12px;
    border-radius: 7px;
    color: var(--ink-3);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-family: inherit;
  }
  .view-toolbar .switch button.active {
    background: var(--blue);
    color: white;
  }
  .view-toolbar .switch button:not(.active):hover { color: var(--ink); }

  /* ============== 网格视图 ============== */
  .grid-view {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }
  /* ============== Item Card — open-design (Geist/Linear-ish) ============== */
  .item-card {
    --ic-line: var(--line);
    --ic-line-hover: var(--ink-3);
    --ic-tone: var(--blue);
    background: var(--card);
    border: 1px solid var(--ic-line);
    border-radius: 14px;
    padding: 22px 22px 20px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
    overflow: hidden;
    transition: border-color .2s ease, background .2s ease;
  }
  .item-card:hover {
    border-color: var(--ic-line-hover);
    background: color-mix(in srgb, var(--ic-tone) 4%, var(--card));
  }
  .item-card:hover .ic-arrow {
    transform: translate(2px, -2px);
    color: var(--ink);
  }
  .item-card .ic-head {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
  }
  .item-card .icon-box {
    width: 30px; height: 30px;
    border-radius: 8px;
    border: 1px solid var(--ic-line);
    background: color-mix(in srgb, var(--ic-tone) 8%, transparent);
    color: var(--ic-tone);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .item-card .ic-eyebrow {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink-3);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    flex: 1;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .item-card .ic-eyebrow b { color: var(--ink-2); font-weight: 600; }
  .item-card .ic-eyebrow .sep { color: var(--line); }
  .item-card .ic-arrow {
    color: var(--ink-3);
    transition: transform .25s cubic-bezier(.16,1,.3,1), color .2s ease;
    flex-shrink: 0;
  }
  .item-card .name {
    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1.3;
  }
  .item-card .desc {
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.6;
    flex: 1;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .item-card .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 2px;
  }
  .item-card .tags span {
    font-family: var(--mono);
    font-size: 10.5px;
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid var(--ic-line);
    background: transparent;
    color: var(--ink-3);
    letter-spacing: 0.04em;
  }
  .item-card.empty {
    --ic-tone: var(--ink-3);
    opacity: 0.55;
    cursor: default;
  }
  .item-card.empty:hover {
    border-color: var(--ic-line);
    background: var(--card);
  }
  .item-card.empty:hover .ic-arrow { transform: none; color: var(--ink-3); }

  /* ============== 列表视图 ============== */
  .list-view {
    background: var(--card);
    border-radius: 16px;
    padding: 8px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.04);
  }
  .list-row {
    display: grid;
    grid-template-columns: 40px 1fr auto auto;
    align-items: center;
    gap: 16px;
    padding: 12px 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s;
    text-decoration: none;
    color: inherit;
  }
  .list-row:hover { background: var(--blue-soft); }
  .list-row .l-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: var(--blue-soft);
    color: var(--blue);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .list-row .l-info .l-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
  }
  .list-row .l-info .l-desc {
    font-size: 12.5px;
    color: var(--ink-3);
    margin-top: 2px;
  }
  .list-row .l-meta {
    font-size: 12px;
    color: var(--ink-3);
    font-family: var(--mono);
  }

  /* ============== 空状态 ============== */
  .empty-state {
    text-align: center;
    padding: 80px 32px;
    color: var(--ink-3);
  }
  .empty-state .icon-box {
    width: 80px; height: 80px;
    border-radius: 20px;
    background: var(--blue-soft);
    color: var(--blue);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
  }
  .empty-state h3 {
    color: var(--ink);
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .empty-state p { font-size: 15px; }

  /* ============== FAB ============== */
  #fab-group {
    position: fixed;
    right: 24px;
    bottom: 24px;
    z-index: 900;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .fab {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: none;
    background: var(--card);
    color: var(--ink);
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .fab:hover {
    background: var(--blue);
    color: white;
    transform: translateY(-2px);
  }
  #fab-top { opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  #fab-top.visible { opacity: 1; pointer-events: auto; }

  /* ========== Site Nav — Rauno-style minimal (unified across site) ========== */
  .site-nav{
    --nv-fg: var(--ink, #141413);
    --nv-fg-soft: var(--ink-3, #87867F);
    --nv-bg: var(--card, #ffffff);
    --nv-bg-soft: var(--bg, #FAF9F5);
    --nv-line: var(--line, #D1CFC5);
    --nv-accent: var(--blue, #D97757);
    --nv-mono: var(--mono, ui-monospace, "SF Mono", monospace);
    position: fixed;
    top: 22px; left: 28px; right: 28px;
    z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    gap: 24px;
    pointer-events: none;
  }
  .site-nav > *{ pointer-events: auto; }
  .nv-brand{
    display: inline-flex; align-items: center; gap: 11px;
    text-decoration: none; color: var(--nv-fg);
  }
  .nv-avatar{
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid var(--nv-line);
    background: var(--nv-bg);
    object-fit: cover;
    transition: transform .25s cubic-bezier(.16,1,.3,1);
  }
  .nv-brand:hover .nv-avatar{ transform: scale(1.06); }
  .nv-id{ display: flex; flex-direction: column; line-height: 1.04; }
  .nv-name{
    font-family: var(--sans, system-ui, sans-serif);
    font-size: 14px; font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--nv-fg);
  }
  .nv-handle{
    font-family: var(--nv-mono);
    font-size: 10px;
    color: var(--nv-fg-soft);
    letter-spacing: 0.08em;
    margin-top: 3px;
  }
  .nv-links{ display: inline-flex; align-items: center; gap: 22px; }
  .nv-links a{
    position: relative;
    font-family: var(--nv-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--nv-fg-soft);
    text-decoration: none;
    padding: 6px 0;
    line-height: 1;
    transition: color .18s ease;
  }
  .nv-links a:hover{ color: var(--nv-fg); }
  .site-nav[data-active="library"] [data-key="library"],
  .site-nav[data-active="works"]   [data-key="works"],
  .site-nav[data-active="repo"]    [data-key="repo"]{ color: var(--nv-fg); }
  .site-nav[data-active="library"] [data-key="library"]::after,
  .site-nav[data-active="works"]   [data-key="works"]::after,
  .site-nav[data-active="repo"]    [data-key="repo"]::after{
    content: "";
    position: absolute;
    left: 50%; bottom: -5px;
    transform: translateX(-50%);
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--nv-accent);
  }
  .nv-links a.soon{
    color: var(--nv-fg-soft);
    text-decoration: line-through;
    text-decoration-thickness: 1px;
    text-underline-offset: 2px;
    opacity: 0.5;
    cursor: not-allowed;
  }
  .nv-links a.soon:hover{ color: var(--nv-fg-soft); }
  .nv-links a.soon::before{
    content: "soon";
    position: absolute;
    bottom: -16px; left: 50%;
    transform: translateX(-50%);
    font-size: 8px;
    letter-spacing: 0.18em;
    color: var(--nv-fg-soft);
    opacity: 0;
    transition: opacity .2s ease;
    pointer-events: none;
    text-decoration: none;
  }
  .nv-links a.soon:hover::before{ opacity: 1; }
  .nv-links a.ext::after{
    content: "↗";
    display: inline-block;
    margin-left: 3px;
    font-size: 0.95em;
    transition: transform .2s ease;
  }
  .nv-links a.ext:hover::after{ transform: translate(1px, -1px); }
  .nv-theme{
    background: none;
    border: 1px solid transparent;
    color: var(--nv-fg-soft);
    border-radius: 999px;
    width: 28px; height: 28px;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: color .18s ease, border-color .18s ease, background .18s ease;
    margin-left: 6px;
  }
  .nv-theme:hover{
    color: var(--nv-fg);
    border-color: var(--nv-line);
    background: var(--nv-bg-soft);
  }
  @media (max-width: 820px){
    .site-nav{ top: 14px; left: 16px; right: 16px; gap: 12px; }
    .nv-handle{ display: none; }
    .nv-links{ gap: 14px; }
    .nv-links a{ font-size: 10px; letter-spacing: 0.1em; }
  }

  @media (max-width: 720px) {
    body { padding: 72px 16px 80px; }
    .hero h1 { font-size: 44px; }
    .grid-view { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="site-nav" data-active="library" id="site-nav">
  <a class="nv-brand" href="home.html" aria-label="kasahuki home">
    <img class="nv-avatar" src="https://avatars.githubusercontent.com/u/208902042?v=4" alt="">
    <span class="nv-id">
      <span class="nv-name">kasahuki</span>
      <span class="nv-handle">@senjay2580</span>
    </span>
  </a>
  <nav class="nv-links">
    <a data-key="library" href="home.html">Library</a>
    <a data-key="works"   href="pages/showcase.html">Works</a>

    <a data-key="resume"  href="#" class="soon" aria-disabled="true">Resume</a>
    <a data-key="blog"    href="#" class="soon" aria-disabled="true">Blog</a>
    <a data-key="github"  href="https://github.com/senjay2580" target="_blank" rel="noopener" class="ext">Github</a>
    <button class="nv-theme" id="nv-theme-btn" aria-label="Toggle theme">
      <i data-lucide="moon" style="width:14px;height:14px;"></i>
    </button>
  </nav>
</header>

<div class="page">
  <!-- Hero -->
  <header class="hero">
    <div class="eyebrow">html2show · KNOWLEDGE LIBRARY</div>
    <h1>知识 <em>图书馆</em></h1>
    <p class="sub">Anthropic Clay 风教学 HTML · 双视图（流式 + PPT）· 全主题。每一篇都是 self-contained 文件，浏览器打开就能看。</p>
  </header>

  <!-- 搜索栏 -->
  <div class="search-wrap">
    <i data-lucide="search" class="search-icon" style="width:20px;height:20px;"></i>
    <input id="search" type="text" placeholder="搜索主题、标签、关键词..." autocomplete="off">
    <span class="kbd">Ctrl K</span>
  </div>

  <!-- 标签筛选 -->
  <div class="tag-bar" id="tag-bar"></div>

  <!-- 面包屑 -->
  <nav class="breadcrumbs" id="breadcrumbs"></nav>

  <!-- 视图工具栏 -->
  <div class="view-toolbar">
    <div class="info">共 <b id="count">0</b> 项</div>
    <div class="switch">
      <button class="active" data-view="grid">
        <i data-lucide="layout-grid" style="width:14px;height:14px;"></i>网格
      </button>
      <button data-view="list">
        <i data-lucide="list" style="width:14px;height:14px;"></i>列表
      </button>
    </div>
  </div>

  <!-- 内容区 -->
  <div id="content"></div>
</div>

<!-- FAB -->
<div id="fab-group">
  <button class="fab" id="fab-theme" title="切换日夜模式">
    <i data-lucide="moon" style="width:20px;height:20px;"></i>
  </button>
  <button class="fab" id="fab-top" title="回到顶部">
    <i data-lucide="arrow-up" style="width:20px;height:20px;"></i>
  </button>
</div>

<script>
  // ========== State ==========
  let manifest = null;
  let currentPath = '/';
  let currentView = 'grid';
  let activeTag = '';
  let searchQuery = '';

  // ========== 工具 ==========
  function findNode(path) {
    if (!manifest) return null;
    if (path === '/' || !path) return manifest.tree;
    const parts = path.split('/').filter(Boolean);
    let node = manifest.tree;
    for (const part of parts) {
      const child = (node.children || []).find(
        c => c.path === '/' + parts.slice(0, parts.indexOf(part) + 1).join('/')
      );
      if (child) node = child;
      else return null;
    }
    return node;
  }

  function flattenAll(node, list = []) {
    if (!node) return list;
    if (node.type === 'page') list.push(node);
    (node.children || []).forEach(c => flattenAll(c, list));
    return list;
  }

  function collectTags() {
    const all = flattenAll(manifest.tree);
    const counts = {};
    all.forEach(p => (p.tags || []).forEach(t => { counts[t] = (counts[t] || 0) + 1; }));
    return counts;
  }

  // ========== 渲染 ==========
  function renderBreadcrumbs() {
    const el = document.getElementById('breadcrumbs');
    el.innerHTML = '';
    const parts = currentPath.split('/').filter(Boolean);

    // 根
    const home = document.createElement('a');
    home.href = '#/';
    home.innerHTML = '<i data-lucide="home" style="width:14px;height:14px;"></i> 全部';
    if (parts.length === 0) home.classList.add('current');
    el.appendChild(home);

    parts.forEach((part, i) => {
      const sep = document.createElement('span');
      sep.className = 'sep';
      sep.innerHTML = '<i data-lucide="chevron-right" style="width:14px;height:14px;"></i>';
      el.appendChild(sep);

      const subPath = '/' + parts.slice(0, i + 1).join('/');
      const node = findNode(subPath);
      const a = document.createElement('a');
      a.href = '#' + subPath;
      a.textContent = node ? node.name : part;
      if (i === parts.length - 1) a.classList.add('current');
      el.appendChild(a);
    });

    if (window.lucide) lucide.createIcons();
  }

  function renderTagBar() {
    const el = document.getElementById('tag-bar');
    const counts = collectTags();
    const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);

    el.innerHTML = `<button class="tag ${activeTag === '' ? 'active' : ''}" data-tag="">
        全部 <span class="count">${flattenAll(manifest.tree).length}</span>
      </button>`;
    entries.forEach(([tag, n]) => {
      el.innerHTML += `<button class="tag ${activeTag === tag ? 'active' : ''}" data-tag="${tag}">
        ${tag} <span class="count">${n}</span>
      </button>`;
    });
    el.querySelectorAll('.tag').forEach(btn => {
      btn.onclick = () => {
        activeTag = btn.dataset.tag;
        render();
      };
    });
  }

  function getDisplayItems() {
    const node = findNode(currentPath);
    if (!node) return [];

    let items = [];

    // 搜索模式: 全树扁平
    if (searchQuery) {
      const all = flattenAll(manifest.tree);
      const q = searchQuery.toLowerCase();
      items = all.filter(p =>
        p.name.toLowerCase().includes(q) ||
        (p.desc || '').toLowerCase().includes(q) ||
        (p.tags || []).some(t => t.toLowerCase().includes(q))
      );
    } else if (activeTag) {
      // 标签筛选: 全树过滤
      const all = flattenAll(manifest.tree);
      items = all.filter(p => (p.tags || []).includes(activeTag));
    } else {
      // 普通: 显示当前层级 children
      items = node.children || [];
    }

    return items;
  }

  function renderItems() {
    const items = getDisplayItems();
    document.getElementById('count').textContent = items.length;

    const container = document.getElementById('content');

    if (items.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon-box">
            <i data-lucide="folder-open" style="width:36px;height:36px;"></i>
          </div>
          <h3>这里还是空的</h3>
          <p>${searchQuery ? '没有匹配项, 试试别的关键词' : activeTag ? '该标签下暂无内容' : '该目录下还没有内容, 期待新主题加入'}</p>
        </div>
      `;
      if (window.lucide) lucide.createIcons();
      return;
    }

    if (currentView === 'grid') {
      container.className = 'grid-view';
      container.innerHTML = items.map(it => renderCard(it)).join('');
    } else {
      container.className = 'list-view';
      container.innerHTML = items.map(it => renderRow(it)).join('');
    }

    // 绑定点击
    container.querySelectorAll('[data-target]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.preventDefault();
        const target = el.dataset.target;
        const isPage = el.dataset.page === 'true';
        if (isPage) {
          window.open(target, '_self');
        } else {
          window.location.hash = target;
        }
      });
    });

    if (window.lucide) lucide.createIcons();
  }

  function renderCard(it) {
    const isPage = it.type === 'page';
    const empty = !isPage && (!it.children || it.children.length === 0);
    const target = isPage ? it.path : it.path;
    const icon = it.icon || (isPage ? 'file-text' : 'folder');
    const tags = (it.tags || []).slice(0, 3).map(t => `<span>${t}</span>`).join('');
    const childCount = !isPage ? `${(it.children || []).length}` : '';
    const eyebrowMeta = isPage
      ? `<b>PAGE</b>${it.updated ? ` <span class="sep">·</span> ${it.updated}` : ''}`
      : `<b>FOLDER</b> <span class="sep">·</span> ${childCount} ${empty ? 'EMPTY' : 'ITEMS'}`;
    const toneStyle = it.color && !empty ? ` style="--ic-tone:${it.color}"` : '';

    return `
      <a class="item-card ${empty ? 'empty' : ''}"${toneStyle} ${empty ? '' : `data-target="${target}" data-page="${isPage}"`}>
        <div class="ic-head">
          <div class="icon-box">
            <i data-lucide="${icon}" style="width:16px;height:16px;"></i>
          </div>
          <span class="ic-eyebrow">${eyebrowMeta}</span>
          <i class="ic-arrow" data-lucide="${isPage ? 'arrow-up-right' : 'arrow-right'}" style="width:15px;height:15px;"></i>
        </div>
        <div class="name">${it.name}</div>
        <div class="desc">${it.desc || (empty ? '暂无内容' : '')}</div>
        ${tags ? `<div class="tags">${tags}</div>` : ''}
      </a>
    `;
  }

  function renderRow(it) {
    const isPage = it.type === 'page';
    const empty = !isPage && (!it.children || it.children.length === 0);
    const target = it.path;
    const icon = it.icon || (isPage ? 'file-text' : 'folder');
    const meta = isPage ? (it.updated || '') : `${(it.children || []).length} 项`;

    return `
      <a class="list-row" ${empty ? '' : `data-target="${target}" data-page="${isPage}"`}>
        <div class="l-icon" ${it.color && !empty ? `style="background:${it.color}1f;color:${it.color};"` : ''}>
          <i data-lucide="${icon}" style="width:18px;height:18px;"></i>
        </div>
        <div class="l-info">
          <div class="l-name">${it.name}</div>
          <div class="l-desc">${it.desc || ''}</div>
        </div>
        <div class="l-meta">${meta}</div>
        <i data-lucide="chevron-right" style="width:16px;height:16px;color:var(--ink-3);"></i>
      </a>
    `;
  }

  function render() {
    renderBreadcrumbs();
    renderTagBar();
    renderItems();
  }

  // ========== Hash 路由 ==========
  function syncRoute() {
    const hash = window.location.hash.replace(/^#/, '') || '/';
    currentPath = hash;
    activeTag = '';
    searchQuery = '';
    document.getElementById('search').value = '';
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  window.addEventListener('hashchange', syncRoute);

  // ========== 事件 ==========
  document.querySelectorAll('.view-toolbar .switch button').forEach(btn => {
    btn.onclick = () => {
      currentView = btn.dataset.view;
      document.querySelectorAll('.view-toolbar .switch button').forEach(b =>
        b.classList.toggle('active', b === btn));
      renderItems();
    };
  });

  const searchInput = document.getElementById('search');
  searchInput.addEventListener('input', (e) => {
    searchQuery = e.target.value.trim();
    if (searchQuery) activeTag = '';
    renderItems();
  });

  // Ctrl K 聚焦搜索
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault();
      searchInput.focus();
      searchInput.select();
    }
    if (e.key === 'Escape') {
      if (document.activeElement === searchInput) {
        searchQuery = '';
        searchInput.value = '';
        renderItems();
        searchInput.blur();
      }
    }
  });

  // FAB
  const fabTop = document.getElementById('fab-top');
  fabTop.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
  window.addEventListener('scroll', () => {
    fabTop.classList.toggle('visible', window.scrollY > 300);
  });

  const fabTheme = document.getElementById('fab-theme');
  const navTheme = document.getElementById('nv-theme-btn');
  function syncThemeIcon() {
    const isDark = document.body.classList.contains('dark');
    const icon = isDark ? 'sun' : 'moon';
    if (fabTheme) fabTheme.innerHTML = `<i data-lucide="${icon}" style="width:20px;height:20px;"></i>`;
    if (navTheme) navTheme.innerHTML = `<i data-lucide="${icon}" style="width:14px;height:14px;"></i>`;
    if (window.lucide) lucide.createIcons();
  }
  if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
  const toggleTheme = () => {
    document.body.classList.toggle('dark');
    localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    syncThemeIcon();
  };
  if (fabTheme) fabTheme.onclick = toggleTheme;
  if (navTheme) navTheme.onclick = toggleTheme;

  // ========== Inline Fallback Manifest ==========
  // 当 fetch 失败 (例如 file:// 双击本地预览), 用这份兜底
  // GitHub Actions 在部署时会用 build-manifest.js 自动覆盖 manifest.json
  const INLINE_MANIFEST = {
    name: "html2show",
    version: "1.0.0",
    description: "Apple/Karpathy 风教学 HTML 知识图集合",
    tree: {
      name: "全部", type: "folder", path: "/", icon: "library",
      children: [
        {
          name: "操作系统", type: "folder", path: "/os",
          icon: "cpu", color: "#D97757",
          desc: "OS · 408 知识图",
          children: [
            {
              name: "死锁 Deadlock", type: "page",
              path: "pages/deadlock.html",
              icon: "lock",
              tags: ["408", "操作系统", "死锁"],
              desc: "操作系统死锁知识图 · 4 必要条件 · 银行家算法 · RAG",
              updated: "2026-04-25"
            }
          ]
        },
        { name: "数据结构", type: "folder", path: "/ds", icon: "git-branch",
          color: "#16a34a", desc: "Data Structure · 408", children: [] },
        { name: "计算机组成", type: "folder", path: "/co", icon: "cog",
          color: "#9333ea", desc: "Computer Organization · 408", children: [] },
        { name: "计算机网络", type: "folder", path: "/network", icon: "network",
          color: "#ea580c", desc: "Computer Network · 408", children: [] }
      ]
    }
  };

  // 立即渲染初始图标 (search / tag / breadcrumb / fab)
  function initIcons() {
    if (window.lucide && lucide.createIcons) {
      lucide.createIcons();
    } else {
      setTimeout(initIcons, 200);
    }
  }
  initIcons();

  // ========== 初始化: fetch 优先, fallback 用 inline ==========
  function bootstrap(data) {
    manifest = data;
    syncRoute();
    setTimeout(() => {
      syncThemeIcon();
      if (window.lucide) lucide.createIcons();
    }, 50);
  }

  fetch('manifest.json', { cache: 'no-cache' })
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(bootstrap)
    .catch(err => {
      console.warn('fetch manifest 失败, 使用 inline fallback:', err.message);
      bootstrap(INLINE_MANIFEST);

      // file:// 协议下显示提示
      if (location.protocol === 'file:') {
        const tip = document.createElement('div');
        tip.style.cssText = `
          position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
          background: var(--inverse-bg); color: var(--inverse-text);
          padding: 14px 22px; border-radius: 12px;
          font-size: 13px; font-family: var(--mono);
          box-shadow: 0 8px 32px rgba(0,0,0,0.2);
          z-index: 1000; max-width: 90vw;
        `;
        tip.innerHTML = `本地预览中 (使用内置 manifest) · 启动 server 看最新: <b>python -m http.server 8000</b>`;
        document.body.appendChild(tip);
        setTimeout(() => tip.remove(), 8000);
      }
    });
</script>
</body>
</html>
